<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل مع سيركلز | Circles Soft</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="contact.css">
     <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <!-- navbar & footer styles -->
    <link rel="stylesheet" href="/footer/footer.css" />
    <link rel="stylesheet" href="/navbar/navbar.css" />
</head>
<body class="contact-page-luxury">

    <!-- navbar -->
    <div id="navbar-placeholder"></div>

    <div class="luxury-bg-elements">
        <div class="circle-blur"></div>
    </div>

    <!-- تم تغيير h-full إلى min-h-screen وإضافة padding مريح -->
    <main class="main-wrapper">
        <div class="content-container">
            
            <div class="contact-master-card">
                
                <div class="contact-header">
                    <span class="ultra-label">  تواصــــل معنــا</span>
                    <h1 class="contact-main-title">لنصنع <span class="aesthetic-text">الفارق</span> معاً</h1>
                </div>

                <div class="contact-grid">
                    
                    <!-- الجانب الأيمن: المعلومات -->
                    <div class="info-section">
                        <div class="minimal-info-stack">
                           
                            <div class="info-item-luxury">
                                <div class="dot-indicator"></div>
                                <small>رقم الاتصــال</small>
                                <p dir="ltr" class="phone-number">+962 78 886 8944</p>
                                <p dir="ltr" class="phone-number">+966 54 386 8253</p>
                            </div>
                            <div class="info-item-luxury">
                                <div class="dot-indicator"></div>
                                <small>الدعم الفني</small>
                                <p>info@circlessoft.com</p>
                            </div>
                             <div class="info-item-luxury">
                                <div class="dot-indicator"></div>
                                <small>المكتـب الرئيسي</small>
                                <p>الرياض </p>
                                <p>عمـــان      </p>
                               
                                <!-- <p>عمــان |   الأردن</p> -->
                            </div>
                        </div>

                        <!-- الأيقونات الأربعة -->
                        <div class="social-wrapper-contact">
                            <a href="#" class="social-icon-contact linkedin"><i class="fab fa-linkedin-in"></i></a>
                            <a href="#" class="social-icon-contact twitter-x"><i class="fab fa-x-twitter"></i></a>
                            <a href="#" class="social-icon-contact instagram"><i class="fab fa-instagram"></i></a>
                            <a href="#" class="social-icon-contact facebook"><i class="fab fa-facebook-f"></i></a>
                        </div>
                    </div>

                    <!-- الجانب الأيسر: الفورم -->
                    <div class="form-section">
                        <form id="contact-form-premium" class="premium-form">
                            <div class="form-inputs-grid">
                                <div class="input-luxury-group">
                                    <input type="text" required placeholder=" ">
                                    <label>الأسم الكامل</label>
                                    <span class="input-border"></span>
                                </div>
                                <div class="input-luxury-group">
                                    <input type="email" required placeholder=" ">
                                    <label>بريد العمل</label>
                                    <span class="input-border"></span>
                                </div>
                                <div class="input-luxury-group">
                                    <input type="tel" required placeholder=" ">
                                    <label>رقم الجوال</label>
                                    <span class="input-border"></span>
                                </div>
                                <div class="input-luxury-group">
                                    <select required>
                                        <option value="" disabled selected hidden></option>
                                        <option>استفسار عن نظام ERP</option>
                                        <option>حلول الموارد البشرية</option>
                                        <option>طلب عرض سعر</option>
                                    </select>
                                    <label>نوع الخدمة</label>
                                    <span class="input-border"></span>
                                </div>
                                <div class="input-luxury-group full-width">
                                    <textarea rows="2" required placeholder=" "></textarea>
                                    <label>رسالتك (اختياري)</label>
                                    <span class="input-border"></span>
                                </div>
                            </div>

                            <div class="form-footer">
                                <button type="submit" class="btn">
                                    <span>اطلب عرض توضيحي</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- footer -->
    <div id="footer-placeholder"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        gsap.from(".contact-master-card", { duration: 1.5, y: 50, opacity: 0, ease: "expo.out" });
        gsap.from(".input-luxury-group", { duration: 1, y: 20, opacity: 0, stagger: 0.1, ease: "power3.out", delay: 0.5 });
    </script>
    <script src="/footer/footer.js"></script>
    <script src="/navbar/navbar.js"></script>
</body>
</html>
