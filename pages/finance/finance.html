  <script>
        // Simple tab switching functionality
        document.addEventListener('DOMContentLoaded', function() {
            const tabItems = document.querySelectorAll('.tab-item');
            const displayImg = document.querySelector('.display-img');
            const dashboardImages = [
                { img: 'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800', title: 'الفواتير والمبيعات' },
                { img: 'https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=800', title: 'المحاسبة العامة' },
                { img: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=800', title: 'المخزون والمستودعات' },
                { img: 'https://images.unsplash.com/photo-1507925921958-8a62f3d1a50d?w=800', title: 'التقارير والتحليلات' }
            ];

            tabItems.forEach((tab, index) => {
                tab.addEventListener('click', () => {
                    // Remove active class from all tabs
                    tabItems.forEach(t => t.classList.remove('active'));
                    // Add active class to clicked tab
                    tab.classList.add('active');
                    // Update image
                    displayImg.src = dashboardImages[index].img;
                    displayImg.alt = dashboardImages[index].title;
                });
            });

            // Auto-rotate tabs every 4 seconds
            let activeTab = 0;
            setInterval(() => {
                tabItems[activeTab].classList.remove('active');
                activeTab = (activeTab + 1) % tabItems.length;
                tabItems[activeTab].classList.add('active');
                displayImg.src = dashboardImages[activeTab].img;
                displayImg.alt = dashboardImages[activeTab].title;
            }, 4000);
        });
    </script>
