<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عن سيركلز سوفت | Circles Soft</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="aboutt.css">
    <!-- navbar & footer styles -->
    <link rel="stylesheet" href="/footer/footer.css" />
    <link rel="stylesheet" href="/navbar/navbar.css" />
</head>
<body class="about-page-luxury">

    <!-- navbar -->
    <div id="navbar-placeholder"></div>

   <section class="creative-about">
    <div class="about-container">
        
        <!-- قسم الرؤية والرسالة بتنسيق غير متناظر -->
        <div class="vision-grid">
            <div class="text-block">
                <h2 class="section-label">رؤيتنا</h2>
                <p class="main-para">
                    أن نكون الاسم الأول والأكثر ثقة في حلول الإدارة الرقمية المتكاملة في الشرق الأوسط والخليج، وأن نساعد آلاف الشركات على تحقيق نمو مستدام وتميز تنافسي.
                </p>
                <!-- سهم أزرق كمرشد بصري -->
                <svg class="blue-connector" viewBox="0 0 100 20">
                    <path d="M5,10 Q50,0 95,10" stroke="#0055ff" stroke-width="2" fill="none" stroke-dasharray="4,4" />
                    <circle cx="95" cy="10" r="3" fill="#0055ff" />
                </svg>
            </div>

            <div class="image-layering">
                <div class="main-img-box">
                    <img src="/landingpage/assets/pannels/pannel1.png" alt="Team" class="pixel-perfect-img">
                </div>
                <div class="floating-text-box">
                    <h3>رسالتنا</h3>
                    <p>تحويل العمليات الإدارية والمالية المعقدة إلى تجربة سهلة، دقيقة، وممتعة.</p>
                </div>
            </div>
        </div>

       

    </div>
</section>

    <!-- footer -->
    <div id="footer-placeholder"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        gsap.from(".about-master-card", { duration: 1.5, y: 50, opacity: 0, ease: "expo.out" });
        gsap.from(".vm-card", { duration: 1, y: 30, opacity: 0, stagger: 0.2, ease: "power3.out", delay: 0.5 });
        gsap.from(".solution-item", { duration: 1, opacity: 0, stagger: 0.1, ease: "power2.out", delay: 1 });
    </script>
    <script src="/footer/footer.js"></script>
    <script src="/navbar/navbar.js"></script>
</body>
</html>
